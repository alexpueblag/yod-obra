name: Sync Google Sheet

on:
  schedule:
    # Cada 10 minutos. Nota: GitHub Actions puede retrasar runs hasta 15-30 min en horas pico.
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sheet
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync script (no git)
        run: python scripts/sync_sheet.py --no-git --verbose

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data.json"
          else
            git commit -m "sync: auto via github-actions $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
